# Docker Compose pour DringDring - Environnement de développement
version: '3.8'

services:
  # Backend API
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
    volumes:
      - .:/app  # Pour le développement (hot reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

