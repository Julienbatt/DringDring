# Docker Compose pour DringDring - Environnement de développement

services:
  # Backend API
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      # Firebase Configuration
      # ⚠️ ATTENTION: Les vraies valeurs doivent être dans un fichier .env (non commité)
      # Créez backend/.env avec ces variables :
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-dringdring-11a84}
      - FIREBASE_PRIVATE_KEY_ID=${FIREBASE_PRIVATE_KEY_ID:-your-private-key-id}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-your-private-key-here}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-your-client-email@project.iam.gserviceaccount.com}
      - FIREBASE_CLIENT_ID=${FIREBASE_CLIENT_ID:-your-client-id}
      - FIREBASE_AUTH_URI=${FIREBASE_AUTH_URI:-https://accounts.google.com/o/oauth2/auth}
      - FIREBASE_TOKEN_URI=${FIREBASE_TOKEN_URI:-https://oauth2.googleapis.com/token}
      # Sécurité
      # ⚠️ ATTENTION: Les vraies valeurs doivent être dans un fichier .env (non commité)
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key-here}
      # CORS
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
    volumes:
      - .:/app  # Pour le développement (hot reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

